<form [formGroup]="registerForm" autocomplete="off" (ngSubmit)="registerForm.valid && register()">
  <h2 class="text-center text-primary">Sign up</h2>
  <hr />

  <div class="from-group">
    <label class="control-label" style="margin-right: 10px">I am a:</label>
    <label class="radio-inline">
      <input type="radio" value="male" formControlName="gender"> Male 
    </label>
    <label class="radio-inline">
      <input type="radio" value="female" formControlName="gender" class="ml-2"> Female 
    </label>
  </div>

  <app-text-input [formControl]='registerForm.controls["username"]'
      [type]='"text"' [label]='"Username"' ></app-text-input>
  <app-text-input [formControl]='registerForm.controls["knownAs"]'
      [type]='"text"' [label]='"Known As"' ></app-text-input>
  <app-date-input [formControl]='registerForm.controls["dateOfBirth"]'
      [label]='"DOB"' [maxDate]="maxDate"></app-date-input>      
  <app-text-input [formControl]='registerForm.controls["city"]'
      [type]='"text"' [label]='"City"' ></app-text-input>
  <app-text-input [formControl]='registerForm.controls["country"]'
      [type]='"text"' [label]='"Country"' ></app-text-input>            
  <app-text-input [formControl]='registerForm.controls["password"]'
      [type]='"password"' [label]='"Password"' ></app-text-input>
  <app-text-input [formControl]='registerForm.controls["confirmPassword"]'
      [type]='"password"' [label]='"Confirm Password"' ></app-text-input>      

  <div class="row" *ngIf="validationErrors.length>0">
    <ul class="text-danger">
      <li *ngFor="let error of validationErrors">{{error}}</li>
    </ul>   
  </div>

  <div class="form-group text-center mt-2">
    <button [disabled]="!registerForm.valid" class="btn btn-success mr-2" type="submit">Register</button>
    <button class="btn btn-default mr-2" type="button" (click)="cancel()">
      Cancel
    </button>
  </div>
</form>
