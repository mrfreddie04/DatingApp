  <form #registerForm="ngForm" autocomplete="off" (ngSubmit)="register()">
    <h2 class="text-center text-primary">Sign up</h2>
    <hr>
    <div class="form-group">
      <input 
          [(ngModel)]="model.username"
          type="text" 
          class="form-control mr-sm-2" 
          name="username" 
          placeholder="Username"
      />
    </div>
<!-- 
    <div class="form-group">
      <label>Who is your favourite user?</label>        
      <select class="form-control">
        <option *ngFor="let user of usersFromHomeComponent" [value]="user.userName">
          {{user.userName}}
        </option>
      </select>
    </div>     -->

    <div class="from-group">
      <input 
          [(ngModel)]="model.password"
          type="password" 
          class="form-control mr-sm-2" 
          name="password" 
          placeholder="Password"
      />
    </div>
    <div class="form-group text-center">
      <button class="btn btn-success mr-2" type="submit">Register</button>
      <button class="btn btn-default mr-2" type="button" (click)="cancel()">Cancel</button>
    </div>
  </form>
